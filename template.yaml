# CloudFormation / SAM template for AIG async file processing
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AIG exercise


# Defaults applied to all Lambda functions in this stack
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        JOBS_TABLE_NAME: jobs
        # TODO: move this to a parameter and prevent the Early Validation ResourceExistenceCheck
        UPLOAD_BUCKET_NAME: !Sub '${AWS::StackName}-uploads-${AWS::AccountId}'

Resources:
  # Dead Letter Queue for failed process
  ProcessFileDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-file-upload-queue-dlq'

  # SQS queue that receives S3 upload notifications
  FileUploadQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-file-upload-queue'
      VisibilityTimeout: 60 # give enough time to the function to process before moving to the DLQ
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ProcessFileDLQ.Arn
        maxReceiveCount: 1 # I set it to 1 to facilitate the testing of the DLQ and Idempotency

  # Allow S3 to send messages to FileUploadQueue (required for S3 event notifications)
  FileUploadQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref FileUploadQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt FileUploadQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub 'arn:aws:s3:::${AWS::StackName}-uploads-${AWS::AccountId}'

  # S3 bucket where clients upload files; objects under uploads/ send notifications to SQS
  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-uploads-${AWS::AccountId}'
      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:*
            Queue: !GetAtt FileUploadQueue.Arn
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: uploads/

  # DynamoDB table
  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: jobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: jobId
          AttributeType: S
      KeySchema:
        - AttributeName: jobId
          KeyType: HASH

  # Lambda function for (POST /uploads)
  CreateUploadJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/src/handlers/create-upload-job.handler
      Policies:
        # Least-privilege: PutItem (createJob), Scan (getJobByFileName)
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Scan
              Resource: !GetAtt JobsTable.Arn
        # Least-privilege: PutObject only (for presigned upload URL generation)
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: s3:PutObject
              Resource: !Sub 'arn:aws:s3:::${AWS::StackName}-uploads-${AWS::AccountId}/uploads/*'
      Events:
        Api:
          Type: Api
          Properties:
            Path: /uploads
            Method: post

  # Returns current status of a job by jobId (GET /jobs/{jobId})
  GetJobStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/src/handlers/get-job-status.handler
      Policies:
        # Least-privilege: GetItem only (getJobById)
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: dynamodb:GetItem
              Resource: !GetAtt JobsTable.Arn
      Events:
        Api:
          Type: Api
          Properties:
            Path: /jobs/{jobId}
            Method: get

  # Consumes FileUploadQueue (S3 posts to queue on upload)
  ProcessFileFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/src/handlers/process-file.handler
      MemorySize: 512
      Policies:
        # Least-privilege: GetItem (getJobById), UpdateItem (markProcessing, markDone, markFailed)
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource: !GetAtt JobsTable.Arn
        # Least-privilege: GetObject only on uploads/ prefix
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: s3:GetObject
              Resource: !Sub 'arn:aws:s3:::${AWS::StackName}-uploads-${AWS::AccountId}/uploads/*'
      Events:
        FileUploadQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt FileUploadQueue.Arn
            BatchSize: 10

# Values exposed after stack deployment (e.g. for client config or scripts)
Outputs:
  ApiUrl:
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod'
  BucketName:
    Value: !Ref UploadBucket
  JobsTableName:
    Value: !Ref JobsTable
  FileUploadQueueUrl:
    Value: !Ref FileUploadQueue
  FileUploadQueueArn:
    Value: !GetAtt FileUploadQueue.Arn
  ProcessFileDLQName:
    Value: !Ref ProcessFileDLQ
  ProcessFileDLQArn:
    Value: !GetAtt ProcessFileDLQ.Arn