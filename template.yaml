# CloudFormation / SAM template for AIG async file processing
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AIG exercise


# Defaults applied to all Lambda functions in this stack
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    # Injected into every function so they can access jobs table and upload bucket
    Environment:
      Variables:
        JOBS_TABLE_NAME: jobs
        # Dynamic name avoids circular dependency and Early Validation ResourceExistenceCheck
        UPLOAD_BUCKET_NAME: !Sub '${AWS::StackName}-uploads-${AWS::AccountId}'

Resources:
  # S3 bucket where clients upload files; objects under uploads/ trigger processing
  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-uploads-${AWS::AccountId}'

  # DynamoDB table
  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: jobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: jobId
          AttributeType: S
      KeySchema:
        - AttributeName: jobId
          KeyType: HASH

  # Dead Letter Queue for ProcessFileFunction
  ProcessFileDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-process-file-dlq'

  # Lambda fucntion for (POST /uploads)
  CreateUploadJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/src/handlers/create-upload-job.handler
      Policies:
        # Least-privilege: PutItem (createJob), Scan (getJobByFileName)
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Scan
              Resource: !GetAtt JobsTable.Arn
        # Least-privilege: PutObject only (for presigned upload URL generation)
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: s3:PutObject
              Resource: !Sub 'arn:aws:s3:::${AWS::StackName}-uploads-${AWS::AccountId}/uploads/*'
      Events:
        Api:
          Type: Api
          Properties:
            Path: /uploads
            Method: post

  # Returns current status of a job by jobId (GET /jobs/{jobId})
  GetJobStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/src/handlers/get-job-status.handler
      Policies:
        # Least-privilege: GetItem only (getJobById)
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: dynamodb:GetItem
              Resource: !GetAtt JobsTable.Arn
      Events:
        Api:
          Type: Api
          Properties:
            Path: /jobs/{jobId}
            Method: get

  # Invoked when a file is uploaded to uploads/; processes file and updates job status
  ProcessFileFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/src/handlers/process-file.handler
      Timeout: 60
      MemorySize: 512
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt ProcessFileDLQ.Arn
      EventInvokeConfig:
        MaximumRetryAttempts: 0 # no retries, so we can test the DLQ (the default is 2 retries, (3 attempts total))
      Policies:
        # Least-privilege: GetItem (getJobById), UpdateItem (markProcessing, markDone, markFailed)
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource: !GetAtt JobsTable.Arn
        # Least-privilege: GetObject only on uploads/ prefix
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: s3:GetObject
              Resource: !Sub 'arn:aws:s3:::${AWS::StackName}-uploads-${AWS::AccountId}/uploads/*'
        # Least-privilege: SendMessage to DLQ only
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: sqs:SendMessage
              Resource: !GetAtt ProcessFileDLQ.Arn
      Events:
        S3Upload:
          Type: S3
          Properties:
            Bucket: !Ref UploadBucket
            Events: s3:ObjectCreated:*
            # Only objects under uploads/ prefix trigger this function
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: uploads/

# Values exposed after stack deployment (e.g. for client config or scripts)
Outputs:
  ApiUrl:
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod'
  BucketName:
    Value: !Ref UploadBucket
  JobsTableName:
    Value: !Ref JobsTable
  ProcessFileDLQName:
    Value: !Ref ProcessFileDLQ
  ProcessFileDLQArn:
    Value: !GetAtt ProcessFileDLQ.Arn