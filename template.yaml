# CloudFormation / SAM template for AIG async file processing
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AIG exercise


# Defaults applied to all Lambda functions in this stack
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    # Injected into every function so they can access jobs table and upload bucket
    Environment:
      Variables:
        JOBS_TABLE_NAME: jobs
        # Dynamic name avoids circular dependency and Early Validation ResourceExistenceCheck
        UPLOAD_BUCKET_NAME: !Sub '${AWS::StackName}-uploads-${AWS::AccountId}'

Resources:
  # S3 bucket where clients upload files; objects under uploads/ trigger processing
  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-uploads-${AWS::AccountId}'

  # Table storing job metadata (status, created at, etc.) keyed by jobId
  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: jobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: jobId
          AttributeType: S
      KeySchema:
        - AttributeName: jobId
          KeyType: HASH

  # Dead Letter Queue for ProcessFileFunction
  ProcessFileDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-process-file-dlq'

  # Creates a new upload job: writes to DynamoDB and returns presigned S3 URL (POST /uploads)
  CreateUploadJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/src/handlers/create-upload-job.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
        # Same !Sub as bucket (no Ref) to avoid circular dependency and early-validation hook
        - S3WritePolicy:
            BucketName: !Sub '${AWS::StackName}-uploads-${AWS::AccountId}'
      Events:
        Api:
          Type: Api
          Properties:
            Path: /uploads
            Method: post

  # Returns current status of a job by jobId (GET /jobs/{jobId})
  GetJobStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/src/handlers/get-job-status.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref JobsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /jobs/{jobId}
            Method: get

  # Invoked when a file is uploaded to uploads/; processes file and updates job status
  ProcessFileFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/src/handlers/process-file.handler
      Timeout: 60
      MemorySize: 512
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt ProcessFileDLQ.Arn
      EventInvokeConfig:
        MaximumRetryAttempts: 0 # no retries, so we can test the DLQ (the default is 2 retries, (3 attempts total))
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
        # Same !Sub as bucket (no Ref) to avoid circular dependency
        - S3ReadPolicy:
            BucketName: !Sub '${AWS::StackName}-uploads-${AWS::AccountId}'
        # Allow the function to send messages to the DLQ
        - SQSSendMessagePolicy:
            QueueName: !GetAtt ProcessFileDLQ.QueueName
      Events:
        S3Upload:
          Type: S3
          Properties:
            Bucket: !Ref UploadBucket
            Events: s3:ObjectCreated:*
            # Only objects under uploads/ prefix trigger this function
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: uploads/

# Values exposed after stack deployment (e.g. for client config or scripts)
Outputs:
  ApiUrl:
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod'
  BucketName:
    Value: !Ref UploadBucket
  JobsTableName:
    Value: !Ref JobsTable
  ProcessFileDLQName:
    Value: !Ref ProcessFileDLQ
  ProcessFileDLQArn:
    Value: !GetAtt ProcessFileDLQ.Arn